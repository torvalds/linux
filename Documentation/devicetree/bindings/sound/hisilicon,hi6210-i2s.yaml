%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/hisilicon,hi6210-i2s.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon hi6210 I2S controller

maintainers:
  - John Stultz <john.stultz@linaro.org>

allOf:
  - $ref: dai-common.yaml#

properties:
  compatible:
    const: hisilicon,hi6210-i2s

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 2

  clock-names:
    items:
      - const: dacodec
      - const: i2s-base

  dmas:
    maxItems: 2

  dma-names:
    items:
      - const: tx
      - const: rx

  hisilicon,sysctrl-syscon:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: phandle to sysctrl syscon

  "#sound-dai-cells":
    const: 1
    description: |
      The dai cell indexes reference the following interfaces:
        0: S2 interface

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - dmas
  - dma-names
  - hisilicon,sysctrl-syscon
  - "#sound-dai-cells"

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/arm-gic.h>
    #include <dt-bindings/clock/hi6220-clock.h>

    i2s@f7118000 {
        compatible = "hisilicon,hi6210-i2s";
        reg = <0xf7118000 0x8000>;
        interrupts = <GIC_SPI 123 IRQ_TYPE_LEVEL_HIGH>;
        clocks = <&sys_ctrl HI6220_DACODEC_PCLK>,
                 <&sys_ctrl HI6220_BBPPLL0_DIV>;
        clock-names = "dacodec", "i2s-base";
        dmas = <&dma0 14>, <&dma0 15>;
        dma-names = "tx", "rx";
        hisilicon,sysctrl-syscon = <&sys_ctrl>;
        #sound-dai-cells = <1>;
    };
