%YAML 1.2
---
$id: http://devicetree.org/schemas/display/panel/lxd,m9189a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: LXD M9189A DSI Display Panel

maintainers:
  - Michael Tretter <m.tretter@pengutronix.de>

allOf:
  - $ref: panel-common.yaml

properties:
  compatible:
    const: lxd,m9189a

  reg:
    maxItems: 1

  standby-gpios:
    description: GPIO used for the standby pin
    maxItems: 1

  reset-gpios: true
  power-supply: true
  backlight: true
  port: true

required:
  - compatible
  - reg
  - standby-gpios
  - reset-gpios
  - power-supply
  - backlight
  - port

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    dsi {
      #address-cells = <1>;
      #size-cells = <0>;

      panel@0 {
        compatible = "lxd,m9189a";
        reg = <0>;
        backlight = <&backlight>;
        reset-gpios = <&gpio3 25 GPIO_ACTIVE_LOW>;
        standby-gpios = <&gpio5 22 GPIO_ACTIVE_LOW>;
        power-supply = <&reg_display_3v3>;

        port {
          mipi_panel_in: endpoint {
            remote-endpoint = <&mipi_dsi_out>;
          };
        };
      };
    };
