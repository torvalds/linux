%YAML 1.2
---
$id: http://devicetree.org/schemas/interconnect/qcom,eliza-rpmh.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm RPMh Network-On-Chip Interconnect on Eliza SoC

maintainers:
  - Odelu Kukatla <odelu.kukatla@oss.qualcomm.com>

description: |
  RPMh interconnect providers support system bandwidth requirements through
  RPMh hardware accelerators known as Bus Clock Manager (BCM). The provider is
  able to communicate with the BCM through the Resource State Coordinator (RSC)
  associated with each execution environment. Provider nodes must point to at
  least one RPMh device child node pertaining to their RSC and each provider
  can map to multiple RPMh resources.

  See also: include/dt-bindings/interconnect/qcom,eliza-rpmh.h

properties:
  compatible:
    enum:
      - qcom,eliza-aggre1-noc
      - qcom,eliza-aggre2-noc
      - qcom,eliza-clk-virt
      - qcom,eliza-cnoc-cfg
      - qcom,eliza-cnoc-main
      - qcom,eliza-gem-noc
      - qcom,eliza-lpass-ag-noc
      - qcom,eliza-lpass-lpiaon-noc
      - qcom,eliza-lpass-lpicx-noc
      - qcom,eliza-mc-virt
      - qcom,eliza-mmss-noc
      - qcom,eliza-nsp-noc
      - qcom,eliza-pcie-anoc
      - qcom,eliza-system-noc

  reg:
    maxItems: 1

  clocks:
    minItems: 1
    maxItems: 2

required:
  - compatible

allOf:
  - $ref: qcom,rpmh-common.yaml#
  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,eliza-clk-virt
              - qcom,eliza-mc-virt
    then:
      properties:
        reg: false
    else:
      required:
        - reg

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,eliza-aggre1-noc
    then:
      properties:
        clocks:
          items:
            - description: aggre UFS PHY AXI clock
            - description: aggre USB3 PRIM AXI clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,eliza-aggre2-noc
    then:
      properties:
        clocks:
          items:
            - description: RPMH CC IPA clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,eliza-pcie-anoc
    then:
      properties:
        clocks:
          items:
            - description: aggre-NOC PCIe AXI clock
            - description: cfg-NOC PCIe a-NOC AHB clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,eliza-aggre1-noc
              - qcom,eliza-aggre2-noc
              - qcom,eliza-pcie-anoc
    then:
      required:
        - clocks
    else:
      properties:
        clocks: false

unevaluatedProperties: false

examples:
  - |
    gem_noc: interconnect@24100000 {
        compatible = "qcom,eliza-gem-noc";
        reg = <0x24100000 0x163080>;
        #interconnect-cells = <2>;
        qcom,bcm-voters = <&apps_bcm_voter>;
    };

    mc_virt: interconnect-2 {
        compatible = "qcom,eliza-mc-virt";
        #interconnect-cells = <2>;
        qcom,bcm-voters = <&apps_bcm_voter>;
    };

    aggre1_noc: interconnect@16e0000 {
        compatible = "qcom,eliza-aggre1-noc";
        reg = <0x16e0000 0x16400>;
        #interconnect-cells = <2>;
        clocks = <&gcc_phy_axi_clk>, <&gcc_prim_axi_clk>;
        qcom,bcm-voters = <&apps_bcm_voter>;
    };
